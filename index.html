<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel RP</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

h1 {
    color: #00ffcc;
}

input {
    padding: 8px;
    margin: 10px;
    width: 250px;
}

button {
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
}

table {
    margin: auto;
    border-collapse: collapse;
    width: 80%;
}

th, td {
    border: 1px solid #555;
    padding: 10px;
}

th {
    background: #222;
}
</style>

</head>
<body>

<h1>📋 Baza obywateli RP</h1>

<input id="search" placeholder="Szukaj...">
<button onclick="load()">Odśwież</button>

<table>
<tr>
<th>Imię</th>
<th>Nazwisko</th>
<th>PESEL</th>
<th>Status</th>
</tr>
<tbody id="table"></tbody>
</table>

<script>
const API = "https://roblox-api-1.onrender.com/api/users";

async function load() {
    const res = await fetch(API);
    const users = await res.json();

    const search = document.getElementById("search").value.toLowerCase();
    const table = document.getElementById("table");

    table.innerHTML = "";

    users.forEach(u => {
        if (search && !(
            u.imie.toLowerCase().includes(search) ||
            u.nazwisko.toLowerCase().includes(search) ||
            u.pesel.toLowerCase().includes(search)
        )) return;

        const row = `
        <tr>
            <td>${u.imie}</td>
            <td>${u.nazwisko}</td>
            <td>${u.pesel}</td>
            <td>${u.status}</td>
        </tr>`;

        table.innerHTML += row;
    });
}

load();
</script>

</body>
</html>
