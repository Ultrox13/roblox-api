<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Lista graczy Roblox</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Roboto', sans-serif; background: #f4f7f9; color: #333; padding: 20px; }
  h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
  button { display: block; margin: 0 auto 20px auto; padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
  button:hover { background: #2ecc71; }
  table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
  th, td { padding: 12px 15px; text-align: left; }
  th { background: #34495e; color: white; font-weight: 500; }
  tr:nth-child(even) { background: #ecf0f1; }
  tr:hover { background: #d1f2eb; transition: 0.2s; }
  tbody tr td { border-bottom: 1px solid #ddd; }
  .container { max-width: 1000px; margin: 0 auto; }
</style>
</head>
<body>

<div class="container">
  <h1>Lista graczy Roblox</h1>
  <button id="odswiez">Odśwież tabelę</button>

  <table>
    <thead>
      <tr>
        <th>Imię</th>
        <th>Nazwisko</th>
        <th>Data</th>
        <th>PESEL</th>
        <th>Roblox Nick</th>
      </tr>
    </thead>
    <tbody id="tabela-graczy"></tbody>
  </table>
</div>

<script>
const API_URL = "http://localhost:3000/api/users"; // Twój backend

function odswiezTabele() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const tabela = document.getElementById("tabela-graczy");
      tabela.innerHTML = "";
      data.forEach(u => {
        tabela.innerHTML += `<tr>
          <td>${u.imie || ""}</td>
          <td>${u.nazwisko || ""}</td>
          <td>${u.data || ""}</td>
          <td>${u.pesel || ""}</td>
          <td>${u.robloxNick || ""}</td>
        </tr>`;
      });
    })
    .catch(err => {
      console.error("Błąd pobierania danych:", err);
      document.getElementById("tabela-graczy").innerHTML = `<tr><td colspan="5" style="text-align:center;color:red;">Błąd pobierania danych</td></tr>`;
    });
}

document.getElementById("odswiez").addEventListener("click", odswiezTabele);
odswiezTabele();
</script>

</body>
</html>
